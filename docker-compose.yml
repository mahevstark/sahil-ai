services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sahil_ai
      POSTGRES_USER: sahil
      POSTGRES_PASSWORD: sahil
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahil -d sahil_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sahil:sahil@db:5432/sahil_ai
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - whisper_cache:/root/.cache/faster-whisper
      - transcript_cache:/root/.cache/faster-whisper-transcripts
    restart: unless-stopped
    deploy:
      replicas: 1

volumes:
  pgdata:
  whisper_cache:
  transcript_cache:
